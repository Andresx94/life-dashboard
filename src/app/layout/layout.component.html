<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <header class="h-14 border-b border-[var(--color-border)] bg-[var(--color-surface)] flex items-center px-6 shrink-0 w-full fixed top-0 z-50">
    <!-- Logo -->
    <div class="flex items-center gap-3 mr-10">
      <i class="pi pi-objects-column text-[var(--color-accent)] text-xl"></i>
      <span class="text-lg font-bold tracking-tight">Life Dashboard</span>
    </div>

    <!-- Navigation -->
    <nav class="flex items-center gap-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active-link"
          class="nav-link"
        >
          <i [class]="'pi ' + item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Search (right side) -->
    <button class="nav-link ml-auto">
      <i class="pi pi-search"></i>
      <span class="hidden md:inline">Buscar</span>
      <kbd class="hidden md:inline text-[10px] bg-[var(--color-bg)] text-[var(--color-text-muted)] px-1.5 py-0.5 rounded border border-[var(--color-border)] ml-1">Ctrl+K</kbd>
    </button>
  </header>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto pt-14 w-full">
    <div class="p-8">
      <router-outlet />
    </div>
  </main>
</div>
