<div class="flex flex-col h-screen overflow-hidden">
  <!-- Top Navbar -->
  <header class="h-14 border-b border-[var(--color-border)] bg-[var(--color-surface)] flex items-center px-4 md:px-6 shrink-0 fixed top-0 w-full z-50">
    <!-- Mobile menu button -->
    <button (click)="menuOpen = !menuOpen" class="nav-link md:hidden mr-2">
      <i class="pi pi-bars"></i>
    </button>

    <!-- Logo -->
    <div class="flex items-center gap-3 mr-6 lg:mr-10">
      <i class="pi pi-objects-column text-[var(--color-accent)] text-xl"></i>
      <span class="text-lg font-bold tracking-tight hidden sm:inline">Life Dashboard</span>
    </div>

    <!-- Navigation (desktop) -->
    <nav class="hidden md:flex items-center gap-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active-link"
          class="nav-link"
        >
          <i [class]="'pi ' + item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Right actions -->
    <div class="flex items-center gap-1 ml-auto">
      <button class="nav-link" (click)="exportBackup()" title="Descargar backup">
        <i class="pi pi-download"></i>
      </button>
      <button class="nav-link" (click)="fileInput.click()" title="Restaurar backup">
        <i class="pi pi-upload"></i>
      </button>
      <button class="nav-link" (click)="clearAll()" title="Limpiar todo">
        <i class="pi pi-trash"></i>
      </button>
      <input #fileInput type="file" accept=".json" (change)="importBackup($event)" class="hidden">
    </div>
  </header>

  <!-- Mobile menu overlay -->
  @if (menuOpen) {
    <div class="fixed inset-0 z-40 md:hidden" (click)="menuOpen = false">
      <div class="absolute inset-0 bg-black/50"></div>
      <nav class="absolute top-14 left-0 right-0 bg-[var(--color-surface)] border-b border-[var(--color-border)] p-3 space-y-1" (click)="$event.stopPropagation()">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="active-link"
            class="nav-link w-full"
            (click)="menuOpen = false"
          >
            <i [class]="'pi ' + item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
    </div>
  }

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto pt-14 w-full">
    <div class="p-4 md:p-8">
      <router-outlet />
    </div>
  </main>
</div>
