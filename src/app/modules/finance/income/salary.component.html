<div class="space-y-4">
  <!-- Header + Add button -->
  <div class="flex items-center justify-between">
    <h3 class="text-sm font-medium text-[var(--color-text-muted)]">Registro de sueldos</h3>
    <button (click)="showForm = !showForm" class="btn-primary">
      <i class="pi pi-plus text-xs"></i>
      Agregar
    </button>
  </div>

  <!-- Form -->
  @if (showForm) {
    <div class="card p-4 space-y-3">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div>
          <label class="label">Empresa</label>
          <input type="text" [(ngModel)]="form.company" class="input" placeholder="Nombre de la empresa">
        </div>
        <div>
          <label class="label">Monto</label>
          <input type="number" [(ngModel)]="form.amount" class="input" placeholder="0.00">
        </div>
        <div>
          <label class="label">Fecha</label>
          <input type="date" [(ngModel)]="form.date" class="input">
        </div>
      </div>
      <div>
        <label class="label">Notas</label>
        <input type="text" [(ngModel)]="form.notes" class="input" placeholder="Opcional">
      </div>
      <div class="flex gap-2 justify-end">
        <button (click)="cancel()" class="btn-secondary">Cancelar</button>
        <button (click)="save()" class="btn-primary">Guardar</button>
      </div>
    </div>
  }

  <!-- Table -->
  @if (salaries.length > 0) {
    <div class="card overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[var(--color-border)] text-[var(--color-text-muted)] text-xs uppercase">
            <th class="text-left p-3">Empresa</th>
            <th class="text-right p-3">Monto</th>
            <th class="text-left p-3">Fecha</th>
            <th class="text-left p-3">Notas</th>
            <th class="text-right p-3">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (salary of salaries; track salary.id) {
            <tr class="border-b border-[var(--color-border)] last:border-0 hover:bg-[var(--color-surface-hover)]">
              <td class="p-3">{{ salary.company }}</td>
              <td class="p-3 text-right text-emerald-400 font-medium">{{ formatMoney(salary.amount) }}</td>
              <td class="p-3 text-[var(--color-text-muted)]">{{ salary.date }}</td>
              <td class="p-3 text-[var(--color-text-muted)]">{{ salary.notes }}</td>
              <td class="p-3 text-right space-x-2">
                <button (click)="edit(salary)" class="text-[var(--color-text-muted)] hover:text-blue-400 transition-colors">
                  <i class="pi pi-pencil text-xs"></i>
                </button>
                <button (click)="delete(salary.id!)" class="text-[var(--color-text-muted)] hover:text-red-400 transition-colors">
                  <i class="pi pi-trash text-xs"></i>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  } @else {
    <div class="card p-8 text-center">
      <i class="pi pi-briefcase text-2xl text-[var(--color-text-muted)] opacity-50"></i>
      <p class="text-sm text-[var(--color-text-muted)] mt-2">No hay sueldos registrados</p>
    </div>
  }
</div>
